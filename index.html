<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise ❤️</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.3);
max-width:350px;
animation:popIn 0.6s;
z-index:10;
position:relative;
}

h1{
color:#ff4081;
font-size:30px;
margin-bottom:10px;
}

h2{
color:#333;
font-size:24px;
margin:10px 0;
}

p{
font-size:18px;
color:#555;
margin:10px 0;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:#ff4081;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e91e63;
transform:scale(1.05);
}

.hidden{
display:none;
}

.bday-img{
width:200px;
height:200px;
border-radius:50%;
object-fit:cover;
margin:15px auto;
border:5px solid #ff4081;
animation:bounce 2s infinite;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* Balloon Animation 🎈 */
.balloon {
  position:fixed;
  bottom:-100px;
  width:60px;
  height:80px;
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  animation:float 6s ease-in infinite;
  z-index:1;
}

.balloon:before {
  content:'';
  position:absolute;
  bottom:-40px;
  left:50%;
  width:1px;
  height:50px;
  background:rgba(0,0,0,0.2);
  transform:translateX(-50%);
}
