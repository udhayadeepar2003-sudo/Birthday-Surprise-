<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Aarthika</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<!-- Animated Background -->
<div class="background">
    <div class="stars"></div>
</div>

<!-- Welcome Screen -->
<div id="welcome" class="screen">

    <div class="gift-box" onclick="openGift()">
        🎁
    </div>

    <h2 class="tap-text">
        Tap the Gift 🎁
    </h2>

</div>

<!-- Birthday Screen -->
<div id="birthday" class="screen hidden">

    <div class="balloons">
        <div class="balloon left1"></div>
        <div class="balloon left2"></div>

        <div class="balloon right1"></div>
        <div class="balloon right2"></div>
    </div>

    <img src="Aarthika.jpg" class="photo">

    <h1 class="title">
        🎉 HAPPY BIRTHDAY 🎉
    </h1>

    <h2 class="name">
        Aarthika ❤️
    </h2>

    <p class="message">
        May your life be filled with Happiness,
        Love, Success and Endless Smiles. 💖
    </p>

    <div id="fireworks"></div>

    <button class="replay" onclick="location.reload()">
        Replay 🔄
    </button>

</div>

<audio id="music" loop>
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<script src="js/script.js"></script>

</body>
</html>
