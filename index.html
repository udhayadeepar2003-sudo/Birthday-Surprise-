<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Aarthika 🎂</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(-45deg,#89f7fe,#66a6ff,#ff9a9e,#fad0c4);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
display:flex;
justify-content:center;
align-items:center;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#birthday{
display:none;
text-align:center;
padding:20px;
}

button{
padding:15px 35px;
font-size:24px;
border:none;
border-radius:40px;
background:#ff4081;
color:white;
cursor:pointer;
box-shadow:0 0 20px rgba(255,255,255,.5);
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{transform:scale(1.08);}
}

img{
width:260px;
border-radius:30px;
box-shadow:0 0 30px rgba(255,255,255,.8);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
50%{
transform:translateY(-12px) scale(1.03);
}
}
h1{
font-size:55px;
color:white;
text-shadow:0 0 15px #fff;
margin-top:20px;
animation:zoom 2s infinite;
}

@keyframes zoom{
50%{
transform:scale(1.08);
}
}

p{
margin-top:20px;
font-size:28px;
color:white;
font-family:cursive;
text-shadow:0 0 10px black;
}

.balloon{
position:absolute;
bottom:-150px;
width:70px;
height:90px;
border-radius:50%;
animation:rise 10s linear infinite;
opacity:.8;
}

.balloon::after{
content:"";
position:absolute;
width:3px;
height:90px;
background:white;
left:50%;
top:90px;
}

@keyframes rise{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}

</style>
</head>

<body>

<div class="screen" id="home">
<button onclick="openGift()">🎁 Click Here 🎁</button>
</div>

<div class="screen" id="birthday">

<img src="Aarthika.jpg" alt="Aarthika">

<h1>🎂 Happy Birthday Aarthika 🎂</h1>

<p>
May your life be filled with Happiness,<br>
Love ❤️ and Endless Smiles ✨
</p>

</div>  
    <script>
function openGift(){

document.getElementById("home").style.display="none";
document.getElementById("birthday").style.display="flex";

createBalloons();

}

function createBalloons(){

const colors=[
"#ff4d6d",
"#4dabf7",
"#51cf66",
"#ffd43b",
"#f783ff",
"#ffa94d"
];

for(let i=0;i<25;i++){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background=colors[Math.floor(Math.random()*colors.length)];

b.style.animationDuration=(6+Math.random()*6)+"s";

b.style.animationDelay=Math.random()*5+"s";

document.body.appendChild(b);

}

}
</script>

</body>
</html>
