<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Aarthika</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#8e44ad,#ff6ec7,#6dd5fa,#ffffff);
background-size:400% 400%;
animation:bgMove 10s infinite alternate;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.container{
text-align:center;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:40px;
background:#ff4081;
color:white;
cursor:pointer;
}

#birthday{
display:none;
}

img{
width:250px;
border-radius:20px;
margin-bottom:20px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0);}
}

h1{
font-size:40px;
color:white;
text-shadow:0 0 15px hotpink;
}

p{
color:white;
font-size:20px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="container" id="home">

<button onclick="openGift()">🎁 Click Here 🎁</button>

</div>

<div class="container" id="birthday">

<img src="aarthika.png" alt="Aarthika">

<h1>🎂 Happy Birthday Aarthika 🎂</h1>

<p>May your life be filled with Happiness, Love and Success ❤️</p>

</div>

<script>

function openGift(){

document.getElementById("home").style.display="none";

document.getElementById("birthday").style.display="block";

}

</script>

</body>
</html>
