<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Aarthika</title>

<style>
body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#a8d5ff,#ff7bd5);
height:100vh;
}

.screen{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
}

#birthday{
display:none;
}

img{
width:250px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
font-size:55px;
color:white;
margin:20px;
font-weight:bold;
}

p{
font-size:22px;
color:white;
padding:0 20px;
}

button{
padding:15px 30px;
font-size:22px;
border:none;
border-radius:30px;
background:#ff4f8b;
color:white;
cursor:pointer;
}

.balloon{
position:absolute;
bottom:-100px;
width:40px;
height:55px;
border-radius:50%;
opacity:0.7;
animation:rise 15s linear infinite;
z-index:-1;
}

.balloon::after{
content:'';
position:absolute;
width:2px;
height:50px;
background:white;
left:50%;
top:55px;
}

@keyframes rise{
0%{
transform:translateY(0);
}
100%{
transform:translateY(-120vh);
}
}
</style>
</head>

<body>

<audio id="music">
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<div class="screen" id="home">
<button onclick="openGift()">🎁 Click Here 🎁</button>
</div>

<div class="screen" id="birthday">

<div class="balloon" style="left:10%;background:#ff5c8d;"></div>
<div class="balloon" style="left:30%;background:#ffd54f;animation-delay:2s;"></div>
<div class="balloon" style="left:50%;background:#81c784;animation-delay:4s;"></div>
<div class="balloon" style="left:70%;background:#64b5f6;animation-delay:6s;"></div>
<div class="balloon" style="left:90%;background:#ba68c8;animation-delay:8s;"></div>

<img src="Aarthika.jpg" alt="Aarthika">

<h1>🎂 Happy Birthday Aarthika 🎂</h1>

<p>
May your life be filled with Happiness,<br>
Love ❤️ and Endless Smiles ✨
</p>

</div>

<script>
function openGift(){

document.getElementById("home").style.display="none";
document.getElementById("birthday").style.display="flex";

var music=document.getElementById("music");

music.play().catch(function(error){
console.log(error);
});

}
</script>

</body>
</html>
