<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday Aarthika</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#9ec9f5,#f58ad9);
    overflow:hidden;
    height:100vh;
}

.screen{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

#birthday{
    display:none;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:30px;
    font-size:20px;
    background:#ff4081;
    color:white;
}

img{
    width:250px;
    max-width:80%;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

h1{
    color:white;
    font-size:55px;
    margin:20px 10px 10px;
}

p{
    color:white;
    font-size:26px;
    margin:10px;
}

/* Small Balloons */

.balloon{
    position:absolute;
    bottom:-120px;
    width:40px;
    height:50px;
    border-radius:50%;
    opacity:0.5;
    animation:rise linear infinite;
    z-index:-1;
}

.balloon::after{
    content:"";
    position:absolute;
    width:2px;
    height:60px;
    background:white;
    left:50%;
    top:50px;
}

.b1{left:10%;background:red;animation-duration:10s;}
.b2{left:25%;background:yellow;animation-duration:12s;}
.b3{left:45%;background:blue;animation-duration:11s;}
.b4{left:70%;background:green;animation-duration:13s;}
.b5{left:90%;background:orange;animation-duration:9s;}

@keyframes rise{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-120vh);
    }
}
</style>
</head>

<body>

<div class="screen" id="home">
    <button onclick="openGift()">🎁 Click Here 🎁</button>
</div>

<div class="screen" id="birthday">

    <img src="Aarthika.jpg">

    <h1>🎂 Happy Birthday Aarthika 🎂</h1>

    <p>
    May your life be filled with Happiness,<br>
    Love ❤️ and Endless Smiles ✨
    </p>

</div>

<audio id="music">
    <source src="birthday.mp3" type="audio/mpeg">
</audio>

<div class="balloon b1"></div>
<div class="balloon b2"></div>
<div class="balloon b3"></div>
<div class="balloon b4"></div>
<div class="balloon b5"></div>

<script>
function openGift(){

document.getElementById("home").style.display="none";
document.getElementById("birthday").style.display="flex";

let music=document.getElementById("music");
music.play();

}
</script>

</body>
</html>
